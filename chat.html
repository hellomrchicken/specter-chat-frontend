<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    /* Incoming call popup (center) */
    #callPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 20px 25px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      z-index: 9000;
      text-align: center;
      min-width: 260px;
    }

    #callPopupTitle {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #callPopupFrom {
      font-weight: bold;
      margin-bottom: 15px;
    }

    #callPopup button {
      margin: 5px;
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .accept { background: #2ecc71; color: white; }
    .decline { background: #e74c3c; color: white; }

    /* Call overlay (audio only) */
    #callOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    #callWindow {
      background: #181818;
      border-radius: 16px;
      padding: 20px 25px;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
      min-width: 280px;
      text-align: center;
    }

    #callTitle {
      font-size: 18px;
      margin-bottom: 8px;
    }

    #callWith {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 16px;
    }

    #callControls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .control-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .end-btn {
      background: #e74c3c;
      color: white;
    }

    .mute-btn {
      background: #34495e;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startCall()">📞 Call (DM)</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- Incoming call popup -->
<div id="callPopup">
  <div id="callPopupTitle">☎️ Incoming Call</div>
  <div id="callPopupFrom"></div>
  <button class="accept" onclick="acceptCall()">Accept</button>
  <button class="decline" onclick="declineCall()">Decline</button>
</div>

<!-- Audio call overlay -->
<div id="callOverlay">
  <div id="callWindow">
    <div id="callTitle">In call</div>
    <div id="callWith"></div>
    <div id="callControls">
      <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
      <button class="control-btn end-btn" onclick="endCall()">End Call</button>
    </div>
  </div>
</div>

<!-- Hidden remote audio -->
<audio id="remoteAudio" autoplay></audio>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;
let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;

// audio unlock
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play(); dmSound.pause();
    await ring.play(); ring.pause();
    audioUnlocked = true;
  } catch {}
});

// helpers
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);
  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// ========== MEDIA (MIC ONLY) ==========

let localStream = null;

async function getMediaStream() {
  if (localStream) return localStream;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    localStream = stream;
    console.log("Mic stream OK");
    return localStream;
  } catch (err) {
    console.error("getUserMedia (audio-only) failed:", err);
    alert("Could not access microphone.\nCheck:\n- Mic is plugged in / enabled\n- Browser permission is 'Allow'\n- No other app is using the mic");
    throw err;
  }
}

// ========== 1:1 CALLS (DM SIGNALING) ==========

const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

let pc = null;
let currentPeer = null;
let isCaller = false;
let pendingOffer = null;
const processedSignals = new Set();

function openCallOverlay(statusText, withText) {
  document.getElementById("callTitle").textContent = statusText;
  document.getElementById("callWith").textContent = withText || "";
  document.getElementById("callOverlay").style.display = "flex";
}

function closeCallOverlay() {
  document.getElementById("callOverlay").style.display = "none";
}

async function sendSignal(toUser, payload) {
  const text = "__CALL_SIGNAL__" + JSON.stringify({ from:user, to:toUser, payload });
  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ from:user, to:toUser, text })
  });
}

function createPeerConnection() {
  pc = new RTCPeerConnection(rtcConfig);

  pc.onicecandidate = (event) => {
    if (event.candidate && currentPeer) {
      sendSignal(currentPeer, { type:"candidate", candidate:event.candidate });
    }
  };

  pc.ontrack = (event) => {
    const remoteAudio = document.getElementById("remoteAudio");
    if (event.streams && event.streams[0]) {
      remoteAudio.srcObject = event.streams[0];
    }
  };

  pc.onconnectionstatechange = () => {
    if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      endCall(false);
    }
  };
}

async function startCall() {
  if (!dmTarget) {
    alert("Open a DM first to call someone.");
    return;
  }
  if (currentPeer) {
    alert("Already in a call.");
    return;
  }

  currentPeer = dmTarget;
  isCaller = true;

  try {
    await getMediaStream();
  } catch {
    currentPeer = null;
    isCaller = false;
    return;
  }

  createPeerConnection();
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  openCallOverlay("Calling...", "With " + currentPeer);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await sendSignal(currentPeer, { type:"offer", sdp:offer });
}

function showIncomingCallPopup(fromUser) {
  document.getElementById("callPopupFrom").textContent = fromUser + " is calling you";
  document.getElementById("callPopup").style.display = "block";
  if (audioUnlocked) { ring.currentTime = 0; ring.play().catch(()=>{}); }
}

function hideIncomingCallPopup() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
}

async function acceptCall() {
  if (!pendingOffer) {
    hideIncomingCallPopup();
    return;
  }

  const from = pendingOffer.from;
  const remoteSDP = pendingOffer.sdp;
  pendingOffer = null;

  currentPeer = from;
  isCaller = false;

  hideIncomingCallPopup();

  try {
    await getMediaStream();
  } catch {
    await sendSignal(from, { type:"end" });
    currentPeer = null;
    return;
  }

  createPeerConnection();
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  openCallOverlay("In call", "With " + currentPeer);

  await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await sendSignal(currentPeer, { type:"answer", sdp:answer });
}

function declineCall() {
  if (pendingOffer) {
    const from = pendingOffer.from;
    sendSignal(from, { type:"end" });
    pendingOffer = null;
  }
  hideIncomingCallPopup();
}

async function endCall(sendSignalToo = true) {
  if (sendSignalToo && currentPeer) {
    await sendSignal(currentPeer, { type:"end" });
  }

  if (pc) {
    try { pc.close(); } catch {}
    pc = null;
  }

  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  currentPeer = null;
  isCaller = false;
  pendingOffer = null;

  document.getElementById("remoteAudio").srcObject = null;
  closeCallOverlay();
}

function toggleMute() {
  if (!localStream) return;
  const audioTracks = localStream.getAudioTracks();
  if (!audioTracks.length) return;
  const track = audioTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("muteBtn").textContent = track.enabled ? "Mute" : "Unmute";
}

function handleCallSignals(dms) {
  const signals = dms.filter(m => m.text && m.text.startsWith("__CALL_SIGNAL__"));

  for (const m of signals) {
    const key = m.time + "|" + m.from + "|" + m.to + "|" + m.text.length;
    if (processedSignals.has(key)) continue;
    processedSignals.add(key);

    let data;
    try { data = JSON.parse(m.text.replace("__CALL_SIGNAL__", "")); } catch { continue; }

    const { from, to, payload } = data || {};
    if (!payload) continue;
    if (from === user) continue;
    if (to !== user && from !== currentPeer) continue;

    if (payload.type === "offer" && to === user) {
      if (currentPeer || pc || localStream) {
        sendSignal(from, { type:"end" });
        continue;
      }
      pendingOffer = { from, sdp:payload.sdp };
      showIncomingCallPopup(from);

    } else if (payload.type === "answer" && from === currentPeer && pc) {
      pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));

    } else if (payload.type === "candidate" && pc) {
      pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(()=>{});

    } else if (payload.type === "end") {
      if (from === currentPeer || to === currentPeer || to === user) {
        endCall(false);
      }
    }
  }
}

// ========== DM LOAD ==========

async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  const dms = await res.json();

  handleCallSignals(dms);

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a,b)=>new Date(a.time)-new Date(b.time));

  const latest = incoming[incoming.length-1];
  const newestTime = latest ? new Date(latest.time).getTime() : 0;
  if (newestTime > lastSeenDM) {
    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  if (!dmTarget) return;

  const filtered = dms.filter(m =>
    !m.text.startsWith("__CALL_SIGNAL__") &&
    ((m.from === user && m.to === dmTarget) ||
     (m.from === dmTarget && m.to === user))
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m =>
      `<p class="${m.from===user?'msg me':'msg'}"><b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  if (mode !== "public") return;

  document.getElementById("messages").innerHTML =
    msgs.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
