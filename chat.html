<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
      gap: 8px;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    /* Call overlay */
    #callOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }

    #callVideos {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    #callVideos video {
      width: 320px;
      height: 240px;
      background: #000;
      border-radius: 8px;
      object-fit: cover;
    }

    #callControls button {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      margin: 0 5px;
    }

    #endCallBtn {
      background: #e74c3c;
      color: white;
    }

    #incomingCallPopup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #222;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #000;
      z-index: 1000;
    }

    #incomingCallPopup button {
      margin-left: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    #acceptCallBtn {
      background: #4caf50;
      color: white;
    }

    #rejectCallBtn {
      background: #e74c3c;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
    <button id="callBtn" onclick="startCall()" style="display:none;">Call</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- Incoming call popup -->
<div id="incomingCallPopup">
  <span id="incomingCallText"></span>
  <button id="acceptCallBtn" onclick="acceptIncomingCall()">Accept</button>
  <button id="rejectCallBtn" onclick="rejectIncomingCall()">Reject</button>
</div>

<!-- Call overlay -->
<div id="callOverlay">
  <div id="callVideos">
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>
  <div id="callControls">
    <button id="endCallBtn" onclick="endCall()">End Call</button>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;

// audio unlock
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play(); dmSound.pause();
    await ring.play(); ring.pause();
    audioUnlocked = true;
  } catch {}
});

// helpers
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
  document.getElementById("callBtn").style.display = (m === "dm" && dmTarget) ? "inline-block" : "none";
}

function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);
  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}
  
// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  const visible = msgs.filter(m =>
    !m.text.startsWith("__GROUP_CALL__") &&
    !m.text.startsWith("__GROUP_SIGNAL__")
  );

  if (mode !== "public") return;

  document.getElementById("messages").innerHTML =
    visible.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// ===== NEW CALL + DM LOGIC =====

let pc = null;
let localStream = null;
let currentCallPeer = null;
let pendingOffer = null;
let inCall = false;

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const callOverlay = document.getElementById("callOverlay");
const incomingCallPopup = document.getElementById("incomingCallPopup");
const incomingCallText = document.getElementById("incomingCallText");

async function initMedia() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
  localVideo.srcObject = localStream;
}

function createPeerConnection() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    remoteVideo.srcObject = e.streams[0];
  };

  pc.onicecandidate = async e => {
    if (e.candidate && currentCallPeer) {
      await fetch(API + "/dm/send", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          from: user,
          to: currentCallPeer,
          text: "__CALL_CAND__" + JSON.stringify(e.candidate)
        })
      });
    }
  };
}

function showCallOverlay(show) {
  callOverlay.style.display = show ? "flex" : "none";
}

async function startCall() {
  if (!dmTarget) {
    alert("Select a user first.");
    return;
  }
  currentCallPeer = dmTarget;
  await initMedia();
  createPeerConnection();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      from: user,
      to: currentCallPeer,
      text: "__CALL_OFFER__" + JSON.stringify(offer)
    })
  });

  showCallOverlay(true);
  inCall = true;
}

async function acceptIncomingCall() {
  incomingCallPopup.style.display = "none";
  if (!pendingOffer || !currentCallPeer) return;

  await initMedia();
  createPeerConnection();
  await pc.setRemoteDescription(new RTCSessionDescription(pendingOffer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      from: user,
      to: currentCallPeer,
      text: "__CALL_ANSWER__" + JSON.stringify(answer)
    })
  });

  showCallOverlay(true);
  inCall = true;
  pendingOffer = null;
}

function rejectIncomingCall() {
  incomingCallPopup.style.display = "none";
  pendingOffer = null;
  currentCallPeer = null;
}

function endCall() {
  if (pc) {
    pc.close();
    pc = null;
  }
  if (remoteVideo.srcObject) {
    remoteVideo.srcObject.getTracks().forEach(t => t.stop());
    remoteVideo.srcObject = null;
  }
  showCallOverlay(false);
  inCall = false;
  currentCallPeer = null;
}

// DM loading + signaling using /dm/get
async function loadDMs() {
  try {
    const res = await fetch(API + "/dm/get", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username: user })
    });
    const dms = await res.json();

    // normal DMs (no call control messages)
    const normal = dms.filter(m =>
      !m.text.startsWith("__CALL_OFFER__") &&
      !m.text.startsWith("__CALL_ANSWER__") &&
      !m.text.startsWith("__CALL_CAND__")
    );

    if (mode === "dm") {
      const filtered = dmTarget
        ? normal.filter(m => (m.from === user && m.to === dmTarget) || (m.from === dmTarget && m.to === user))
        : normal;
      document.getElementById("dmMessages").innerHTML =
        filtered.map(m =>
          `<p class="${m.from===user?'msg me':'msg'}"><b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}</p>`
        ).join("");
    }

    // simple DM popup (any new DM)
    if (dms.length > 0) {
      dmPopup.style.display = "block";
      dmSound.currentTime = 0;
      dmSound.play().catch(()=>{});
      setTimeout(() => dmPopup.style.display = "none", 3000);
    }

    // handle call signaling
    for (const m of dms) {
      if (m.to !== user) continue; // only incoming to me

      if (m.text.startsWith("__CALL_OFFER__")) {
        const offer = JSON.parse(m.text.replace("__CALL_OFFER__", ""));
        if (inCall) continue;
        pendingOffer = offer;
        currentCallPeer = m.from;
        incomingCallText.textContent = `Incoming call from ${m.from}`;
        incomingCallPopup.style.display = "block";
        ring.currentTime = 0;
        ring.play().catch(()=>{});
      } else if (m.text.startsWith("__CALL_ANSWER__")) {
        if (!pc) continue;
        const answer = JSON.parse(m.text.replace("__CALL_ANSWER__", ""));
        pc.setRemoteDescription(new RTCSessionDescription(answer));
      } else if (m.text.startsWith("__CALL_CAND__")) {
        if (!pc) continue;
        const cand = JSON.parse(m.text.replace("__CALL_CAND__", ""));
        pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{});
      }
    }
  } catch (e) {
    console.error("loadDMs error", e);
  }
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
loadDMs();
</script>

</body>
</html>
