<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>

  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    /* Incoming call popup (center) */
    #callPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 20px 25px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      z-index: 9000;
      text-align: center;
      min-width: 260px;
    }

    #callPopupTitle {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #callPopupFrom {
      font-weight: bold;
      margin-bottom: 15px;
    }

    #callPopup button {
      margin: 5px;
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .accept { background: #2ecc71; color: white; }
    .decline { background: #e74c3c; color: white; }

    /* Video call overlay */
    #videoCallOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    #videoCallWindow {
      position: relative;
      width: 80%;
      max-width: 900px;
      height: 70%;
      max-height: 600px;
      background: #181818;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #videoHeader {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    #videoHeader span {
      font-size: 14px;
      color: #ccc;
    }

    #videoBody {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #localVideoWrapper {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 180px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid #4caf50;
      overflow: hidden;
      background: #111;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #videoControls {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: center;
      gap: 10px;
      border-top: 1px solid #333;
    }

    .control-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .end-btn {
      background: #e74c3c;
      color: white;
    }

    .mute-btn {
      background: #34495e;
      color: white;
    }

    .cam-btn {
      background: #8e44ad;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startCall()">📞 Call</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- Incoming call popup -->
<div id="callPopup">
  <div id="callPopupTitle">☎️ Incoming Call</div>
  <div id="callPopupFrom"></div>
  <button class="accept" onclick="acceptCall()">Accept</button>
  <button class="decline" onclick="declineCall()">Decline</button>
</div>

<!-- WebRTC video call overlay -->
<div id="videoCallOverlay">
  <div id="videoCallWindow">
    <div id="videoHeader">
      <span id="callStatus">In call</span>
      <span id="callWith"></span>
    </div>
    <div id="videoBody">
      <video id="remoteVideo" autoplay playsinline></video>
      <div id="localVideoWrapper">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>
    <div id="videoControls">
      <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
      <button class="control-btn cam-btn" id="camBtn" onclick="toggleCamera()">Camera Off</button>
      <button class="control-btn end-btn" onclick="endCall()">End Call</button>
    </div>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");

if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;

let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;

// audio
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play();
    dmSound.pause();
    ring.play();
    ring.pause();
    audioUnlocked = true;
  } catch {}
});

// escape
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

// switch
function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

// logout
function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);

  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// ========== 1:1 WEBRTC CALLING ==========

const rtcConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

let pc = null;
let localStream = null;
let currentCallPeer = null;
let isCaller = false;
let pendingOffer = null;
const processedSignals = new Set();

// UI
function openVideoOverlay(peerName) {
  const overlay = document.getElementById("videoCallOverlay");
  overlay.style.display = "flex";
  document.getElementById("callWith").textContent = peerName ? ("With " + peerName) : "";
  document.getElementById("callStatus").textContent = isCaller ? "Calling..." : "In call";
}

function closeVideoOverlay() {
  const overlay = document.getElementById("videoCallOverlay");
  overlay.style.display = "none";
  document.getElementById("remoteVideo").srcObject = null;
  document.getElementById("localVideo").srcObject = null;
}

// signaling via DM
async function sendSignal(toUser, payload) {
  const text = "__CALL_SIGNAL__" + JSON.stringify({
    from: user,
    to: toUser,
    payload
  });

  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ from:user, to:toUser, text })
  });
}

// peer connection
function createPeerConnection() {
  pc = new RTCPeerConnection(rtcConfig);

  pc.onicecandidate = (event) => {
    if (event.candidate && currentCallPeer) {
      sendSignal(currentCallPeer, { type: "candidate", candidate: event.candidate });
    }
  };

  pc.ontrack = (event) => {
    const remoteVideo = document.getElementById("remoteVideo");
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
    }
  };

  pc.onconnectionstatechange = () => {
    if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
      endCall(false);
    }
  };
}

// local media
async function startLocalStream() {
  if (localStream) return localStream;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localStream = stream;
    const localVideo = document.getElementById("localVideo");
    localVideo.srcObject = localStream;
    return localStream;
  } catch (err) {
    console.error("getUserMedia error:", err);
    alert("Could not access camera/microphone. Make sure:\n- You're on HTTPS or localhost\n- Permissions are allowed in the browser\n- No other app is locking the camera/mic");
    throw err;
  }
}

// start call
async function startCall() {
  if (!dmTarget) {
    alert("Open a DM first to call someone.");
    return;
  }
  if (pc || currentCallPeer) {
    alert("You are already in a call.");
    return;
  }

  currentCallPeer = dmTarget;
  isCaller = true;

  try {
    await startLocalStream();
  } catch {
    currentCallPeer = null;
    isCaller = false;
    return;
  }

  createPeerConnection();
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  openVideoOverlay(currentCallPeer);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await sendSignal(currentCallPeer, { type: "offer", sdp: offer });
}

// incoming call popup
function showIncomingCallPopup(fromUser) {
  const popup = document.getElementById("callPopup");
  document.getElementById("callPopupFrom").textContent = fromUser + " is calling you";
  popup.style.display = "block";

  if (audioUnlocked) {
    ring.currentTime = 0;
    ring.play().catch(()=>{});
  }
}

function hideIncomingCallPopup() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
}

// accept
async function acceptCall() {
  if (!pendingOffer) {
    hideIncomingCallPopup();
    return;
  }

  const from = pendingOffer.from;
  const remoteSDP = pendingOffer.sdp;

  currentCallPeer = from;
  isCaller = false;

  hideIncomingCallPopup();

  try {
    await startLocalStream();
  } catch {
    // tell caller we can't
    await sendSignal(from, { type: "end" });
    pendingOffer = null;
    currentCallPeer = null;
    return;
  }

  createPeerConnection();
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  openVideoOverlay(currentCallPeer);

  pendingOffer = null;

  await pc.setRemoteDescription(new RTCSessionDescription(remoteSDP));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await sendSignal(currentCallPeer, { type: "answer", sdp: answer });
}

// decline
function declineCall() {
  if (pendingOffer) {
    const from = pendingOffer.from;
    sendSignal(from, { type: "end" });
    pendingOffer = null;
  }
  hideIncomingCallPopup();
}

// end call
async function endCall(sendSignalToo = true) {
  if (sendSignalToo && currentCallPeer) {
    await sendSignal(currentCallPeer, { type: "end" });
  }

  if (pc) {
    try { pc.close(); } catch {}
    pc = null;
  }

  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  currentCallPeer = null;
  isCaller = false;
  pendingOffer = null;

  closeVideoOverlay();
}

// mute / cam
function toggleMute() {
  if (!localStream) return;
  const audioTracks = localStream.getAudioTracks();
  if (!audioTracks.length) return;
  const track = audioTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("muteBtn").textContent = track.enabled ? "Mute" : "Unmute";
}

function toggleCamera() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (!videoTracks.length) return;
  const track = videoTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("camBtn").textContent = track.enabled ? "Camera Off" : "Camera On";
}

// handle signaling from DMs
function handleCallSignals(dms) {
  const signals = dms.filter(m => m.text && m.text.startsWith("__CALL_SIGNAL__"));

  for (const m of signals) {
    const key = m.time + "|" + m.from + "|" + m.to + "|" + m.text.length;
    if (processedSignals.has(key)) continue;
    processedSignals.add(key);

    let data;
    try {
      data = JSON.parse(m.text.replace("__CALL_SIGNAL__", ""));
    } catch {
      continue;
    }

    const { from, to, payload } = data || {};
    if (!payload) continue;

    // ignore our own signaling
    if (from === user) continue;

    // only care about messages to us or from our current peer
    if (to !== user && from !== currentCallPeer) continue;

    if (payload.type === "offer" && to === user) {
      // already in a call? reject
      if (pc || currentCallPeer || localStream) {
        sendSignal(from, { type: "end" });
        continue;
      }

      pendingOffer = { from, sdp: payload.sdp };
      showIncomingCallPopup(from);

    } else if (payload.type === "answer" && from === currentCallPeer && pc) {
      pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));

    } else if (payload.type === "candidate" && pc) {
      pc.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(()=>{});

    } else if (payload.type === "end") {
      if (from === currentCallPeer || to === currentCallPeer || to === user) {
        endCall(false);
      }
    }
  }
}

// ========== DM LOAD ==========

async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  const dms = await res.json();

  handleCallSignals(dms);

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a,b)=>new Date(a.time)-new Date(b.time));

  const latest = incoming[incoming.length-1];
  const newestTime = latest ? new Date(latest.time).getTime() : 0;

  if (newestTime > lastSeenDM) {
    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  if (!dmTarget) return;

  const filtered = dms.filter(m =>
    !m.text.startsWith("__CALL_SIGNAL__") &&
    ((m.from === user && m.to === dmTarget) ||
     (m.from === dmTarget && m.to === user))
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m =>
      `<p class="${m.from===user?'msg me':'msg'}"><b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  if (mode !== "public") return;

  document.getElementById("messages").innerHTML =
    msgs.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
