<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover { background: #333; }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .msg.me { text-align:right; color:#4caf50; }

    /* CALL UI */
    #videoCallOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    #videoCallWindow {
      width: 80%;
      height: 75%;
      background: #181818;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #videoBody {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      padding: 8px;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #localVideoWrapper {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 180px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid #4caf50;
      overflow: hidden;
      background: #111;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startDirectCall()">Call</button>
  <button onclick="startGroupCall()">Group Call</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg">
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- CALL UI -->
<div id="videoCallOverlay">
  <div id="videoCallWindow">
    <div id="videoBody">
      <video id="remoteVideo" autoplay playsinline></video>
      <div id="localVideoWrapper">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) window.location = "index.html";

let mode="public", dmTarget=null;
let localStream=null;

/* =======================
   🔥 FIXED MEDIA SYSTEM
======================= */

async function getMediaStream() {
  if (localStream) return localStream;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });
  } catch (e1) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: false
      });
    } catch (e2) {
      alert("Mic/camera blocked. Use HTTPS + allow permissions.");
      throw e2;
    }
  }

  document.getElementById("localVideo").srcObject = localStream;
  return localStream;
}

/* attach stream safely BEFORE call */
function attachStream(pc) {
  if (!localStream) return;
  localStream.getTracks().forEach(track => {
    if (!pc.getSenders().find(s => s.track === track)) {
      pc.addTrack(track, localStream);
    }
  });
}

/* =======================
   DIRECT CALL FIX
======================= */

let directPC=null, currentPeer=null;

function createDirectPC() {
  directPC = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  attachStream(directPC); // 🔥 FIX HERE

  directPC.ontrack = (event) => {
    const v = document.getElementById("remoteVideo");
    v.srcObject = event.streams[0];
    v.style.display = "block";
  };
}

/* CALL START */
async function startDirectCall() {
  if (!dmTarget) return alert("Open DM first");

  await getMediaStream();

  createDirectPC();
  currentPeer = dmTarget;

  const offer = await directPC.createOffer();
  await directPC.setLocalDescription(offer);

  await fetch(API+"/dm/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      from:user,
      to:dmTarget,
      text:"__CALL__"+JSON.stringify({type:"offer",sdp:offer})
    })
  });
}

/* ANSWER HANDLER (IMPORTANT FIX) */
async function handleCall(msgs){
  for (const m of msgs) {
    if (!m.text?.startsWith("__CALL__")) continue;

    const data = JSON.parse(m.text.replace("__CALL__",""));

    if (data.type === "offer") {
      await getMediaStream();

      createDirectPC();
      currentPeer = m.from;

      await directPC.setRemoteDescription(new RTCSessionDescription(data.sdp));

      const answer = await directPC.createAnswer();
      await directPC.setLocalDescription(answer);

      await fetch(API+"/dm/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          from:user,
          to:m.from,
          text:"__CALL__"+JSON.stringify({type:"answer",sdp:answer})
        })
      });
    }

    if (data.type === "answer" && directPC) {
      await directPC.setRemoteDescription(new RTCSessionDescription(data.sdp));
    }
  }
}

/* =======================
   BASIC CHAT (UNCHANGED)
======================= */

async function send(){
  const text=document.getElementById("msg").value;
  await fetch(API+"/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user,text})
  });
}

async function loadMessages(){
  const res=await fetch(API+"/messages");
  const msgs=await res.json();

  handleCall(msgs);

  document.getElementById("messages").innerHTML =
    msgs.map(m=>`<p><b>${m.username}:</b> ${m.text}</p>`).join("");
}

setInterval(loadMessages,2000);
loadMessages();
</script>

</body>
</html>
