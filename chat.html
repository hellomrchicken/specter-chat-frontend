<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    
    .control-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .end-btn {
      background: #e74c3c;
      color: white;
    }

    .mute-btn {
      background: #34495e;
      color: white;
    }

    .cam-btn {
      background: #8e44ad;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;
let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;

// audio unlock
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play(); dmSound.pause();
    await ring.play(); ring.pause();
    audioUnlocked = true;
  } catch {}
});

// helpers
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);
  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}
  
// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  handleGroupAnnouncements(msgs);
  handleGroupSignals(msgs);

  if (mode !== "public") return;

  const visible = msgs.filter(m =>
    !m.text.startsWith("__GROUP_CALL__") &&
    !m.text.startsWith("__GROUP_SIGNAL__")
  );

  document.getElementById("messages").innerHTML =
    visible.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
