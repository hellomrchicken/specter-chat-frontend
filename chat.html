<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover { background: #333; }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover { background: #45a047; }

    .msg.me { text-align: right; color: #4caf50; }

    #videoCallOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    #videoCallWindow {
      width: 80%;
      height: 75%;
      background: #181818;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #videoBody {
      flex: 1;
      background: black;
      position: relative;
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideoWrapper {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 160px;
      height: 110px;
      border: 2px solid #4caf50;
      border-radius: 10px;
      overflow: hidden;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #videoControls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #222;
    }

    button { cursor: pointer; }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>
  <button onclick="startDirectCall()">Call</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- CALL UI -->
<div id="videoCallOverlay">
  <div id="videoCallWindow">
    <div id="videoBody">
      <video id="remoteVideo" autoplay playsinline></video>

      <div id="localVideoWrapper">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>

    <div id="videoControls">
      <button onclick="toggleMute()">Mute</button>
      <button onclick="toggleCamera()">Cam</button>
      <button onclick="endCall()">End</button>
    </div>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) location = "index.html";

let dmTarget = null;
let localStream = null;

let pc = null;
let remoteDescSet = false;
let iceQueue = [];

function showOverlay() {
  document.getElementById("videoCallOverlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("videoCallOverlay").style.display = "none";
  document.getElementById("remoteVideo").srcObject = null;
}

async function getMediaStream() {
  if (localStream) return localStream;

  let stream;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });
  } catch (e1) {
    console.warn("Video failed, trying audio only", e1);

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: false
      });
    } catch (e2) {
      console.warn("Mic blocked", e2);

      document.getElementById("videoCallOverlay").style.display = "none";
      alert("Microphone blocked. Please allow permissions in browser settings.");
      throw e2;
    }
  }

  localStream = stream;

  const video = document.getElementById("localVideo");
  if (stream.getVideoTracks().length) {
    video.srcObject = stream;
  }

  return stream;
}

function createPC() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  pc.onicecandidate = e => {
    if (e.candidate && dmTarget) {
      sendSignal(dmTarget, {
        type: "candidate",
        candidate: e.candidate
      });
    }
  };

  pc.ontrack = e => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };
}

async function startDirectCall() {
  if (!dmTarget) return alert("Pick a user first");

  await getMediaStream();

  createPC();

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  showOverlay();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  sendSignal(dmTarget, { type: "offer", sdp: offer });
}

async function sendSignal(to, payload) {
  await fetch(API + "/dm/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      from: user,
      to,
      text: "__CALL__" + JSON.stringify(payload)
    })
  });
}

function handleSignal(msgs) {
  const signals = msgs.filter(m => m.text?.startsWith("__CALL__"));

  for (const m of signals) {
    const data = JSON.parse(m.text.replace("__CALL__", ""));
    const { type, sdp, candidate } = data;

    if (type === "offer") {
      dmTarget = m.from;

      getMediaStream().then(() => {
        createPC();
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.setRemoteDescription(new RTCSessionDescription(sdp))
          .then(() => pc.createAnswer())
          .then(a => pc.setLocalDescription(a))
          .then(() => {
            sendSignal(dmTarget, { type: "answer", sdp: pc.localDescription });
          });

        showOverlay();
      });

    } else if (type === "answer") {
      pc.setRemoteDescription(new RTCSessionDescription(sdp));

    } else if (type === "candidate") {
      if (!remoteDescSet) {
        iceQueue.push(candidate);
      } else {
        pc.addIceCandidate(new RTCIceCandidate(candidate));
      }
    }
  }
}

function toggleMute() {
  localStream?.getAudioTracks().forEach(t => t.enabled = !t.enabled);
}

function toggleCamera() {
  localStream?.getVideoTracks().forEach(t => t.enabled = !t.enabled);
}

function endCall() {
  pc?.close();
  pc = null;
  remoteDescSet = false;
  iceQueue = [];

  localStream?.getTracks().forEach(t => t.stop());
  localStream = null;

  closeOverlay();
}

async function send() {}

setInterval(async () => {
  const res = await fetch(API + "/dm/get", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: user })
  });

  const dms = await res.json();
  handleSignal(dms);

}, 2000);
</script>

</body>
</html>
