<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>

  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
    }

    /* CALL POPUP */
    #callPopup {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: #222;
      padding: 15px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 10px black;
    }

    #callPopup button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .accept { background: green; color: white; }
    .decline { background: red; color: white; }

    /* VIDEO */
    #videoCall {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      z-index:9999;
    }

    #videoCall iframe {
      width:100%;
      height:100%;
      border:none;
    }

    #endCall {
      position:absolute;
      top:10px;
      right:10px;
      background:red;
      color:white;
      padding:10px;
      border:none;
      z-index:10000;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startCall()">📞 Call</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- CALL POPUP -->
<div id="callPopup">
  <div>☎️ Incoming Call</div>
  <button class="accept" onclick="acceptCall()">📞</button>
  <button class="decline" onclick="declineCall()">❌</button>
</div>

<!-- VIDEO -->
<div id="videoCall">
  <button id="endCall" onclick="endCall()">End</button>
  <iframe id="callFrame"></iframe>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");

if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;

let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;
let initialized = false;

let currentRoom = null;

// sounds
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

let audioUnlocked = false;

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play();
    dmSound.pause();
    ring.play();
    ring.pause();
    audioUnlocked = true;
  } catch {}
});

// escape
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

// popup
function showDMPopup() {
  const popup = document.getElementById("dmPopup");
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 3000);
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  const users = [...new Set(msgs.map(m => m.username))];

  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

// MODE
function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

// OPEN DM
function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// CALL START
async function startCall() {
  if (!dmTarget) return alert("Open a DM first");

  const room = "specter_" + Date.now();
  currentRoom = room;

  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      from: user,
      to: dmTarget,
      text: "__CALL__:" + room
    })
  });

  openVideo(room);
}

// CHECK CALLS
async function checkCalls(dms) {
  const call = dms.find(m =>
    m.to === user &&
    m.text.startsWith("__CALL__:")
  );

  if (call) {
    currentRoom = call.text.split(":")[1];
    document.getElementById("callPopup").style.display = "block";
    if (audioUnlocked) ring.play().catch(()=>{});
  }
}

// ACCEPT
function acceptCall() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
  openVideo(currentRoom);
}

// DECLINE
function declineCall() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
}

// VIDEO
function openVideo(room) {
  document.getElementById("videoCall").style.display = "block";
  document.getElementById("callFrame").src = "https://meet.jit.si/" + room;
}

// END
function endCall() {
  document.getElementById("videoCall").style.display = "none";
  document.getElementById("callFrame").src = "";
}

// LOAD DMs
async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username:user })
  });

  const dms = await res.json();

  checkCalls(dms);

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a,b)=> new Date(a.time)-new Date(b.time));

  const latest = incoming[incoming.length - 1];
  const newestTime = latest ? new Date(latest.time).getTime() : 0;

  const hasNewDM = initialized && newestTime > lastSeenDM;

  if (hasNewDM && mode !== "dm") {
    showDMPopup();
    if (audioUnlocked) dmSound.play().catch(()=>{});
    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  initialized = true;

  if (!dmTarget) return;

  const filtered = dms.filter(m =>
    (m.from === user && m.to === dmTarget) ||
    (m.from === dmTarget && m.to === user)
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m => `
      <p class="msg ${m.from === user ? 'me' : ''}">
        <b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}
      </p>
    `).join("");
}

// PUBLIC
async function loadMessages() {
  if (mode !== "public") return;

  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  document.getElementById("messages").innerHTML =
    msgs.map(m => `
      <p class="msg ${m.username === user ? 'me' : ''}">
        <b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}
      </p>
    `).join("");
}

// LOGOUT
function logout() {
  localStorage.removeItem("user");
  localStorage.removeItem("lastSeenDM");
  window.location = "index.html";
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
