<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>

  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    /* Incoming group call popup (center) */
    #callPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 20px 25px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      z-index: 9000;
      text-align: center;
      min-width: 260px;
    }

    #callPopupTitle {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #callPopupFrom {
      font-weight: bold;
      margin-bottom: 15px;
    }

    #callPopup button {
      margin: 5px;
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .accept { background: #2ecc71; color: white; }
    .decline { background: #e74c3c; color: white; }

    /* Video call overlay (group WebRTC) */
    #videoCallOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #videoCallWindow {
      position: relative;
      width: 80%;
      max-width: 1000px;
      height: 75%;
      max-height: 650px;
      background: #181818;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #videoHeader {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    #videoHeader span {
      font-size: 14px;
      color: #ccc;
    }

    #videoBody {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      flex-direction: row;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    #remoteVideos {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      justify-content: center;
    }

    .remote-video-wrapper {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      flex: 1 1 calc(50% - 8px);
      min-width: 200px;
      min-height: 140px;
      max-height: 100%;
    }

    .remote-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remote-name {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 6px;
    }

    #localVideoWrapper {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 180px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid #4caf50;
      overflow: hidden;
      background: #111;
      z-index: 10;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #videoControls {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: center;
      gap: 10px;
      border-top: 1px solid #333;
    }

    .control-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .end-btn {
      background: #e74c3c;
      color: white;
    }

    .mute-btn {
      background: #34495e;
      color: white;
    }

    .cam-btn {
      background: #8e44ad;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startGroupCall()">📞 Start Group Call</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- Incoming group call popup -->
<div id="callPopup">
  <div id="callPopupTitle">📞 Group Call</div>
  <div id="callPopupFrom"></div>
  <button class="accept" onclick="acceptCall()">Accept</button>
  <button class="decline" onclick="declineCall()">Decline</button>
</div>

<!-- WebRTC group video call overlay -->
<div id="videoCallOverlay">
  <div id="videoCallWindow">
    <div id="videoHeader">
      <span id="callStatus">In call</span>
      <span id="callWith"></span>
    </div>
    <div id="videoBody">
      <div id="remoteVideos"></div>
      <div id="localVideoWrapper">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>
    <div id="videoControls">
      <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
      <button class="control-btn cam-btn" id="camBtn" onclick="toggleCamera()">Camera Off</button>
      <button class="control-btn end-btn" onclick="endCall()">End Call</button>
    </div>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");

if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;

let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;

// audio
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

// unlock audio
document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play();
    dmSound.pause();
    ring.play();
    ring.pause();
    audioUnlocked = true;
  } catch {}
});

// escape
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

// switch
function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

// logout
function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);

  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// ========== GROUP CALL (WEBRTC, HOST-AS-HUB) ==========

const rtcConfig = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

let groupRoomId = null;
let isGroupHost = false;
let inGroupCall = false;
let currentGroupHost = null;

let localStream = null;
let peerConnections = {}; // username -> RTCPeerConnection
const processedGroupSignals = new Set();
const seenGroupCalls = new Set();

let pendingGroupRoomId = null;
let pendingGroupHost = null;

// UI helpers
function openVideoOverlay() {
  document.getElementById("videoCallOverlay").style.display = "flex";
  document.getElementById("callStatus").textContent = isGroupHost ? "Hosting group call" : "In group call";
  document.getElementById("callWith").textContent = groupRoomId ? ("Room: " + groupRoomId) : "";
}

function closeVideoOverlay() {
  document.getElementById("videoCallOverlay").style.display = "none";
  document.getElementById("remoteVideos").innerHTML = "";
  const localVideo = document.getElementById("localVideo");
  localVideo.srcObject = null;
}

// local media
async function startLocalStream() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  const localVideo = document.getElementById("localVideo");
  localVideo.srcObject = localStream;
}

// create remote video element
function ensureRemoteVideo(username) {
  const container = document.getElementById("remoteVideos");
  let wrapper = document.getElementById("remote-" + username);
  if (!wrapper) {
    wrapper = document.createElement("div");
    wrapper.className = "remote-video-wrapper";
    wrapper.id = "remote-" + username;

    const vid = document.createElement("video");
    vid.autoplay = true;
    vid.playsInline = true;

    const label = document.createElement("div");
    label.className = "remote-name";
    label.textContent = username;

    wrapper.appendChild(vid);
    wrapper.appendChild(label);
    container.appendChild(wrapper);
  }
  return wrapper.querySelector("video");
}

function removeRemoteVideo(username) {
  const wrapper = document.getElementById("remote-" + username);
  if (wrapper && wrapper.parentNode) {
    wrapper.parentNode.removeChild(wrapper);
  }
}

// create peer connection
function createPeerConnectionFor(username) {
  const pc = new RTCPeerConnection(rtcConfig);
  peerConnections[username] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  pc.onicecandidate = (event) => {
    if (event.candidate && groupRoomId) {
      sendGroupSignal({
        roomId: groupRoomId,
        from: user,
        to: username,
        payload: { type: "candidate", candidate: event.candidate }
      });
    }
  };

  pc.ontrack = (event) => {
    const remoteVideo = ensureRemoteVideo(username);
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
    }
  };

  pc.onconnectionstatechange = () => {
    if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
      removePeer(username);
    }
  };

  return pc;
}

function removePeer(username) {
  const pc = peerConnections[username];
  if (pc) {
    try { pc.close(); } catch {}
    delete peerConnections[username];
  }
  removeRemoteVideo(username);
}

// send group signal via public chat
async function sendGroupSignal(obj) {
  const text = "__GROUP_SIGNAL__" + JSON.stringify(obj);
  await fetch(API + "/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: user, text })
  });
}

// start group call (host)
async function startGroupCall() {
  if (inGroupCall) {
    alert("You are already in a call.");
    return;
  }

  groupRoomId = "room_" + Date.now();
  isGroupHost = true;
  inGroupCall = true;
  currentGroupHost = user;

  openVideoOverlay();

  try {
    await startLocalStream();
  } catch (e) {
    alert("Could not access camera/microphone.");
    endCall(false);
    return;
  }

  // announce group call
  const announce = "__GROUP_CALL__" + JSON.stringify({
    roomId: groupRoomId,
    host: user,
    time: Date.now()
  });

  await fetch(API + "/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: user, text: announce })
  });
}

// handle group call announcements
function handleGroupAnnouncements(msgs) {
  const calls = msgs.filter(m => m.text && m.text.startsWith("__GROUP_CALL__"));

  if (!calls.length) return;

  // take latest
  calls.sort((a,b)=> new Date(b.time) - new Date(a.time));
  const latest = calls[0];

  const key = latest.time + "|" + latest.username + "|" + latest.text.length;
  if (seenGroupCalls.has(key)) return;
  seenGroupCalls.add(key);

  let data;
  try {
    data = JSON.parse(latest.text.replace("__GROUP_CALL__", ""));
  } catch {
    return;
  }

  const { roomId, host } = data;
  if (!roomId || !host) return;

  // ignore if we are host or already in call
  if (host === user || inGroupCall) return;

  // show popup
  pendingGroupRoomId = roomId;
  pendingGroupHost = host;

  document.getElementById("callPopupFrom").textContent =
    host + " started a group call. Join?";
  document.getElementById("callPopup").style.display = "block";

  if (audioUnlocked) {
    ring.currentTime = 0;
    ring.play().catch(()=>{});
  }
}

// accept group call
async function acceptCall() {
  if (!pendingGroupRoomId || !pendingGroupHost) {
    declineCall();
    return;
  }

  document.getElementById("callPopup").style.display = "none";
  ring.pause();

  groupRoomId = pendingGroupRoomId;
  currentGroupHost = pendingGroupHost;
  pendingGroupRoomId = null;
  pendingGroupHost = null;

  isGroupHost = false;
  inGroupCall = true;

  openVideoOverlay();

  try {
    await startLocalStream();
  } catch (e) {
    alert("Could not access camera/microphone.");
    endCall(false);
    return;
  }

  // send join signal to host
  await sendGroupSignal({
    roomId: groupRoomId,
    from: user,
    to: currentGroupHost,
    payload: { type: "join" }
  });
}

// decline group call
function declineCall() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
  pendingGroupRoomId = null;
  pendingGroupHost = null;
}

// handle group signaling
async function handleGroupSignals(msgs) {
  const signals = msgs.filter(m => m.text && m.text.startsWith("__GROUP_SIGNAL__"));

  for (const m of signals) {
    const key = m.time + "|" + m.username + "|" + m.text.length;
    if (processedGroupSignals.has(key)) continue;
    processedGroupSignals.add(key);

    let data;
    try {
      data = JSON.parse(m.text.replace("__GROUP_SIGNAL__", ""));
    } catch {
      continue;
    }

    const { roomId, from, to, payload } = data || {};
    if (!roomId || !payload || !from) continue;

    // ignore if not our room
    if (roomId !== groupRoomId && !(payload.type === "join" && isGroupHost && roomId === groupRoomId)) {
      // special case: host may see join before setting roomId? but host already has it
      if (!(isGroupHost && roomId === groupRoomId)) continue;
    }

    // ignore our own signals
    if (from === user) continue;

    // host logic
    if (isGroupHost && roomId === groupRoomId) {
      if (payload.type === "join" && to === user) {
        // new participant wants to join
        const username = from;
        if (!peerConnections[username]) {
          const pc = createPeerConnectionFor(username);
          // create offer to participant
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await sendGroupSignal({
            roomId: groupRoomId,
            from: user,
            to: username,
            payload: { type: "offer", sdp: offer }
          });
        }
      } else if (payload.type === "answer" && to === user) {
        const username = from;
        const pc = peerConnections[username];
        if (pc && payload.sdp) {
          await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        }
      } else if (payload.type === "candidate" && to === user) {
        const username = from;
        const pc = peerConnections[username];
        if (pc && payload.candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
          } catch {}
        }
      } else if (payload.type === "end" && to === user) {
        // participant left
        removePeer(from);
      }
    }

    // participant logic
    if (!isGroupHost && inGroupCall && roomId === groupRoomId) {
      if (payload.type === "offer" && to === user && from === currentGroupHost) {
        // host sent offer
        let pc = peerConnections[from];
        if (!pc) {
          pc = createPeerConnectionFor(from);
        }
        if (payload.sdp) {
          await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await sendGroupSignal({
            roomId: groupRoomId,
            from: user,
            to: from,
            payload: { type: "answer", sdp: answer }
          });
        }
      } else if (payload.type === "candidate" && to === user && from === currentGroupHost) {
        const pc = peerConnections[from];
        if (pc && payload.candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
          } catch {}
        }
      } else if (payload.type === "end" && to === user && from === currentGroupHost) {
        // host ended call
        endCall(false);
      }
    }
  }
}

// end call
async function endCall(sendSignalToo = true) {
  if (sendSignalToo && inGroupCall && groupRoomId) {
    if (isGroupHost) {
      // host: tell all peers
      const peers = Object.keys(peerConnections);
      for (const p of peers) {
        await sendGroupSignal({
          roomId: groupRoomId,
          from: user,
          to: p,
          payload: { type: "end" }
        });
      }
    } else if (currentGroupHost) {
      // participant: tell host
      await sendGroupSignal({
        roomId: groupRoomId,
        from: user,
        to: currentGroupHost,
        payload: { type: "end" }
      });
    }
  }

  // cleanup peers
  for (const u in peerConnections) {
    removePeer(u);
  }
  peerConnections = {};

  // cleanup local stream
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  inGroupCall = false;
  isGroupHost = false;
  groupRoomId = null;
  currentGroupHost = null;

  closeVideoOverlay();
}

// controls
function toggleMute() {
  if (!localStream) return;
  const audioTracks = localStream.getAudioTracks();
  if (!audioTracks.length) return;
  const track = audioTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("muteBtn").textContent = track.enabled ? "Mute" : "Unmute";
}

function toggleCamera() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (!videoTracks.length) return;
  const track = videoTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("camBtn").textContent = track.enabled ? "Camera Off" : "Camera On";
}

// ========== DM LOAD ==========

async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  const dms = await res.json();

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a,b)=>new Date(a.time)-new Date(b.time));

  const latest = incoming[incoming.length-1];
  const newestTime = latest ? new Date(latest.time).getTime() : 0;

  if (newestTime > lastSeenDM) {
    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  if (!dmTarget) return;

  const filtered = dms.filter(m =>
    ((m.from === user && m.to === dmTarget) ||
     (m.from === dmTarget && m.to === user))
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m =>
      `<p class="${m.from===user?'msg me':'msg'}"><b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  // handle group call stuff
  handleGroupAnnouncements(msgs);
  handleGroupSignals(msgs);

  if (mode !== "public") return;

  // hide signaling messages from chat
  const visible = msgs.filter(m =>
    !m.text.startsWith("__GROUP_CALL__") &&
    !m.text.startsWith("__GROUP_SIGNAL__")
  );

  document.getElementById("messages").innerHTML =
    visible.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
