<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      color: white;
      font-weight: bold;
      box-shadow: 0 0 15px #ff00ff;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>Users</h2>
    <div id="userList"></div>

    <hr>

    <button onclick="switchMode('public')">Public Chat</button>
    <button onclick="switchMode('dm')" id="dmButton">DMs</button>
  </div>

  <div id="main">
    <div id="messages"></div>
    <div id="dmMessages" style="display:none;"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type a message...">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <div id="dmPopup">New DM!</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
let mode = "public";
let dmTarget = null;

if (!user) window.location = "index.html";

document.title = "Specter Chat - " + user;

// Notification permission
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// DM sound
const dmSound = new Audio("dm.mp3");

// FIXED: Unlock audio silently
document.addEventListener("click", () => {
  dmSound.muted = true;
  dmSound.play().then(() => {
    dmSound.pause();
    dmSound.currentTime = 0;
    dmSound.muted = false;
  });
}, { once: true });

// Popup
function showDMPopup() {
  const popup = document.getElementById("dmPopup");
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 3000);
}

// Load users
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))];
  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${u}</p>`).join("");
}

// Switch mode
function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
  if (m === "public") dmTarget = null;
}

// Open DM
function openDM(target) {
  mode = "dm";
  dmTarget = target;
  switchMode("dm");
  loadDMs();
}

// Send message
async function send() {
  const text = document.getElementById("msg").value;
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, text })
    });
  } else {
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ from: user, to: dmTarget, text })
    });
  }

  document.getElementById("msg").value = "";
  loadMessages();
  loadDMs();
}

let lastDMCount = 0;

// Load DMs
async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: user })
  });

  const dms = await res.json();
  const incoming = dms.filter(m => m.to === user);

  // New DM alert
  if (incoming.length > lastDMCount && mode !== "dm") {
    dmSound.play();
    showDMPopup();
    if (Notification.permission === "granted") {
      new Notification("New DM!", { body: "You got a message" });
    }
  }

  lastDMCount = incoming.length;

  if (!dmTarget) return;

  const filtered = dms.filter(
    m => (m.from === user && m.to === dmTarget) ||
         (m.from === dmTarget && m.to === user)
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m => `
      <p class="msg ${m.from === user ? 'me' : ''}">
        <b class="dm-tag">${m.from} → ${m.to}:</b> ${m.text}
      </p>
    `).join("");
}

// Load public messages
async function loadMessages() {
  if (mode !== "public") return;
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  document.getElementById("messages").innerHTML =
    msgs.map(m => `
      <p class="msg ${m.username === user ? 'me' : ''}">
        <b>${m.username}:</b> ${m.text}
      </p>
    `).join("");
}

// Auto-refresh
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
</html>
