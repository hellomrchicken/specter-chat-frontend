<!DOCTYPE html>
<html>
<head>
  <title>Specter Chat</title>
  <link id="favicon" rel="icon" type="image/png" href="specter_logo_normal.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      border-right: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #userList p {
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    #userList p:hover {
      background: #333;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages, #dmMessages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #inputArea input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      background: #111;
      color: white;
    }

    #inputArea button {
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #inputArea button:hover {
      background: #45a047;
    }

    .msg.me {
      text-align: right;
      color: #4caf50;
    }

    #dmPopup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff00ff;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 15px #ff00ff;
    }

    /* Incoming call popup (center) */
    #callPopup, #groupCallPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 20px 25px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      z-index: 9000;
      text-align: center;
      min-width: 260px;
    }

    #callPopupTitle, #groupCallPopupTitle {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #callPopupFrom, #groupCallPopupFrom {
      font-weight: bold;
      margin-bottom: 15px;
    }

    #callPopup button, #groupCallPopup button {
      margin: 5px;
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .accept { background: #2ecc71; color: white; }
    .decline { background: #e74c3c; color: white; }

    /* Video call overlay (used for 1:1 and group) */
    #videoCallOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    #videoCallWindow {
      position: relative;
      width: 80%;
      max-width: 1000px;
      height: 75%;
      max-height: 650px;
      background: #181818;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #videoHeader {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    #videoHeader span {
      font-size: 14px;
      color: #ccc;
    }

    #videoBody {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    /* 1:1 remote video */
    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: none;
    }

    /* group remote videos */
    #remoteVideos {
      flex: 1;
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      justify-content: center;
    }

    .remote-video-wrapper {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      flex: 1 1 calc(50% - 8px);
      min-width: 200px;
      min-height: 140px;
      max-height: 100%;
    }

    .remote-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remote-name {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 6px;
    }

    #localVideoWrapper {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 180px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid #4caf50;
      overflow: hidden;
      background: #111;
      z-index: 10;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #videoControls {
      padding: 10px 15px;
      background: #202020;
      display: flex;
      justify-content: center;
      gap: 10px;
      border-top: 1px solid #333;
    }

    .control-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .end-btn {
      background: #e74c3c;
      color: white;
    }

    .mute-btn {
      background: #34495e;
      color: white;
    }

    .cam-btn {
      background: #8e44ad;
      color: white;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Users</h2>
  <div id="userList"></div>

  <hr>

  <button onclick="switchMode('public')">Public Chat</button>
  <button onclick="switchMode('dm')">DMs</button>
  <button onclick="startDirectCall()">📞 Call (DM)</button>
  <button onclick="startGroupCall()">👥 Group Call</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="messages"></div>
  <div id="dmMessages" style="display:none;"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dmPopup">New DM!</div>

<!-- Incoming 1:1 call popup -->
<div id="callPopup">
  <div id="callPopupTitle">☎️ Incoming Call</div>
  <div id="callPopupFrom"></div>
  <button class="accept" onclick="acceptDirectCall()">Accept</button>
  <button class="decline" onclick="declineDirectCall()">Decline</button>
</div>

<!-- Incoming group call popup -->
<div id="groupCallPopup">
  <div id="groupCallPopupTitle">👥 Group Call</div>
  <div id="groupCallPopupFrom"></div>
  <button class="accept" onclick="acceptGroupCall()">Join</button>
  <button class="decline" onclick="declineGroupCall()">Ignore</button>
</div>

<!-- WebRTC video call overlay -->
<div id="videoCallOverlay">
  <div id="videoCallWindow">
    <div id="videoHeader">
      <span id="callStatus">In call</span>
      <span id="callWith"></span>
    </div>
    <div id="videoBody">
      <video id="remoteVideo" autoplay playsinline></video>
      <div id="remoteVideos"></div>
      <div id="localVideoWrapper">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>
    <div id="videoControls">
      <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
      <button class="control-btn cam-btn" id="camBtn" onclick="toggleCamera()">Camera Off</button>
      <button class="control-btn end-btn" onclick="endCall()">End Call</button>
    </div>
  </div>
</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");
if (!user) window.location = "index.html";

let mode = "public";
let dmTarget = null;
let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;

// audio unlock
let audioUnlocked = false;
const dmSound = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");
const ring = new Audio("https://hellomrchicken.github.io/specter-chat-frontend/dm.mp3");

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await dmSound.play(); dmSound.pause();
    await ring.play(); ring.pause();
    audioUnlocked = true;
  } catch {}
});

// helpers
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
}

function logout() {
  localStorage.removeItem("user");
  window.location = "index.html";
}

// USERS
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))].filter(u => u !== user);
  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

function openDM(target) {
  dmTarget = target;
  switchMode("dm");
}

// SEND
async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username:user, text })
    });
  } else {
    if (!dmTarget) {
      alert("Select a user from the list first.");
      return;
    }
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ from:user, to:dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// ========== MEDIA (MIC/CAM) ==========

let localStream = null;

async function getMediaStream() {
  if (localStream) return localStream;

  // try audio+video, then audio-only
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    localStream = stream;
  } catch (e1) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      localStream = stream;
    } catch (e2) {
      console.error("Media error:", e1, e2);
      alert("Could not access microphone.\nCheck:\n- HTTPS / localhost\n- Browser permissions\n- No other app using the mic");
      throw e2;
    }
  }

  const localVideo = document.getElementById("localVideo");
  localVideo.srcObject = localStream;
  return localStream;
}

// ========== 1:1 CALLS (DM SIGNALING) ==========

const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

let directPC = null;
let currentDirectPeer = null;
let isDirectCaller = false;
let pendingDirectOffer = null;
const processedDirectSignals = new Set();

function openOverlay(modeLabel, withText) {
  const overlay = document.getElementById("videoCallOverlay");
  overlay.style.display = "flex";
  document.getElementById("callStatus").textContent = modeLabel;
  document.getElementById("callWith").textContent = withText || "";
}

function closeOverlay() {
  const overlay = document.getElementById("videoCallOverlay");
  overlay.style.display = "none";
  document.getElementById("remoteVideo").srcObject = null;
  document.getElementById("localVideo").srcObject = null;
  document.getElementById("remoteVideo").style.display = "none";
  document.getElementById("remoteVideos").style.display = "none";
}

async function sendDirectSignal(toUser, payload) {
  const text = "__CALL_SIGNAL__" + JSON.stringify({ from:user, to:toUser, payload });
  await fetch(API + "/dm/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ from:user, to:toUser, text })
  });
}

function createDirectPC() {
  directPC = new RTCPeerConnection(rtcConfig);

  directPC.onicecandidate = (event) => {
    if (event.candidate && currentDirectPeer) {
      sendDirectSignal(currentDirectPeer, { type:"candidate", candidate:event.candidate });
    }
  };

  directPC.ontrack = (event) => {
    const remoteVideo = document.getElementById("remoteVideo");
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
      remoteVideo.style.display = "block";
      document.getElementById("remoteVideos").style.display = "none";
    }
  };

  directPC.onconnectionstatechange = () => {
    if (["failed","disconnected","closed"].includes(directPC.connectionState)) {
      endCall(false);
    }
  };
}

async function startDirectCall() {
  if (!dmTarget) {
    alert("Open a DM first to call someone.");
    return;
  }
  if (currentDirectPeer) {
    alert("Already in a call.");
    return;
  }

  currentDirectPeer = dmTarget;
  isDirectCaller = true;

  try {
    await getMediaStream();
  } catch {
    currentDirectPeer = null;
    isDirectCaller = false;
    return;
  }

  createDirectPC();
  localStream.getTracks().forEach(t => directPC.addTrack(t, localStream));

  openOverlay("Calling...", "With " + currentDirectPeer);

  const offer = await directPC.createOffer();
  await directPC.setLocalDescription(offer);
  await sendDirectSignal(currentDirectPeer, { type:"offer", sdp:offer });
}

function showIncomingDirectPopup(fromUser) {
  document.getElementById("callPopupFrom").textContent = fromUser + " is calling you";
  document.getElementById("callPopup").style.display = "block";
  if (audioUnlocked) { ring.currentTime = 0; ring.play().catch(()=>{}); }
}

function hideIncomingDirectPopup() {
  document.getElementById("callPopup").style.display = "none";
  ring.pause();
}

async function acceptDirectCall() {
  if (!pendingDirectOffer) {
    hideIncomingDirectPopup();
    return;
  }

  const from = pendingDirectOffer.from;
  const remoteSDP = pendingDirectOffer.sdp;
  pendingDirectOffer = null;

  currentDirectPeer = from;
  isDirectCaller = false;

  hideIncomingDirectPopup();

  try {
    await getMediaStream();
  } catch {
    await sendDirectSignal(from, { type:"end" });
    currentDirectPeer = null;
    return;
  }

  createDirectPC();
  localStream.getTracks().forEach(t => directPC.addTrack(t, localStream));

  openOverlay("In call", "With " + currentDirectPeer);

  await directPC.setRemoteDescription(new RTCSessionDescription(remoteSDP));
  const answer = await directPC.createAnswer();
  await directPC.setLocalDescription(answer);
  await sendDirectSignal(currentDirectPeer, { type:"answer", sdp:answer });
}

function declineDirectCall() {
  if (pendingDirectOffer) {
    const from = pendingDirectOffer.from;
    sendDirectSignal(from, { type:"end" });
    pendingDirectOffer = null;
  }
  hideIncomingDirectPopup();
}

function handleDirectSignals(dms) {
  const signals = dms.filter(m => m.text && m.text.startsWith("__CALL_SIGNAL__"));

  for (const m of signals) {
    const key = m.time + "|" + m.from + "|" + m.to + "|" + m.text.length;
    if (processedDirectSignals.has(key)) continue;
    processedDirectSignals.add(key);

    let data;
    try { data = JSON.parse(m.text.replace("__CALL_SIGNAL__", "")); } catch { continue; }

    const { from, to, payload } = data || {};
    if (!payload) continue;
    if (from === user) continue;
    if (to !== user && from !== currentDirectPeer) continue;

    if (payload.type === "offer" && to === user) {
      if (currentDirectPeer || directPC || localStream) {
        sendDirectSignal(from, { type:"end" });
        continue;
      }
      pendingDirectOffer = { from, sdp:payload.sdp };
      showIncomingDirectPopup(from);

    } else if (payload.type === "answer" && from === currentDirectPeer && directPC) {
      directPC.setRemoteDescription(new RTCSessionDescription(payload.sdp));

    } else if (payload.type === "candidate" && directPC) {
      directPC.addIceCandidate(new RTCIceCandidate(payload.candidate)).catch(()=>{});

    } else if (payload.type === "end") {
      if (from === currentDirectPeer || to === currentDirectPeer || to === user) {
        endCall(false);
      }
    }
  }
}

// ========== GROUP CALLS (PUBLIC SIGNALING, HOST-AS-HUB) ==========

let groupRoomId = null;
let isGroupHost = false;
let inGroupCall = false;
let groupHost = null;
let pendingGroupInvite = null;
const processedGroupSignals = new Set();
const seenGroupAnnouncements = new Set();
let groupPeers = {}; // username -> RTCPeerConnection

async function sendGroupSignal(obj) {
  const text = "__GROUP_SIGNAL__" + JSON.stringify(obj);
  await fetch(API + "/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username:user, text })
  });
}

function ensureRemoteVideo(username) {
  const container = document.getElementById("remoteVideos");
  let wrapper = document.getElementById("remote-" + username);
  if (!wrapper) {
    wrapper = document.createElement("div");
    wrapper.className = "remote-video-wrapper";
    wrapper.id = "remote-" + username;

    const vid = document.createElement("video");
    vid.autoplay = true;
    vid.playsInline = true;

    const label = document.createElement("div");
    label.className = "remote-name";
    label.textContent = username;

    wrapper.appendChild(vid);
    wrapper.appendChild(label);
    container.appendChild(wrapper);
  }
  return wrapper.querySelector("video");
}

function removeRemoteVideo(username) {
  const wrapper = document.getElementById("remote-" + username);
  if (wrapper && wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
}

function createGroupPCFor(username) {
  const pc = new RTCPeerConnection(rtcConfig);
  groupPeers[username] = pc;

  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.onicecandidate = (event) => {
    if (event.candidate && groupRoomId) {
      sendGroupSignal({
        roomId: groupRoomId,
        from: user,
        to: username,
        payload: { type:"candidate", candidate:event.candidate }
      });
    }
  };

  pc.ontrack = (event) => {
    const video = ensureRemoteVideo(username);
    if (event.streams && event.streams[0]) {
      video.srcObject = event.streams[0];
    }
    document.getElementById("remoteVideos").style.display = "flex";
    document.getElementById("remoteVideo").style.display = "none";
  };

  pc.onconnectionstatechange = () => {
    if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      removeGroupPeer(username);
    }
  };

  return pc;
}

function removeGroupPeer(username) {
  const pc = groupPeers[username];
  if (pc) {
    try { pc.close(); } catch {}
    delete groupPeers[username];
  }
  removeRemoteVideo(username);
}

async function startGroupCall() {
  if (inGroupCall || currentDirectPeer) {
    alert("Already in a call.");
    return;
  }

  try {
    await getMediaStream();
  } catch {
    return;
  }

  groupRoomId = "room_" + Date.now();
  isGroupHost = true;
  inGroupCall = true;
  groupHost = user;

  openOverlay("Hosting group call", "Room " + groupRoomId);
  document.getElementById("remoteVideos").style.display = "flex";
  document.getElementById("remoteVideo").style.display = "none";

  const announce = "__GROUP_CALL__" + JSON.stringify({
    roomId: groupRoomId,
    host: user,
    time: Date.now()
  });

  await fetch(API + "/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username:user, text:announce })
  });
}

function handleGroupAnnouncements(msgs) {
  const calls = msgs.filter(m => m.text && m.text.startsWith("__GROUP_CALL__"));
  if (!calls.length) return;

  calls.sort((a,b)=> new Date(b.time) - new Date(a.time));
  const latest = calls[0];
  const key = latest.time + "|" + latest.username + "|" + latest.text.length;
  if (seenGroupAnnouncements.has(key)) return;
  seenGroupAnnouncements.add(key);

  let data;
  try { data = JSON.parse(latest.text.replace("__GROUP_CALL__", "")); } catch { return; }
  const { roomId, host } = data || {};
  if (!roomId || !host) return;
  if (host === user || inGroupCall || currentDirectPeer) return;

  pendingGroupInvite = { roomId, host };
  document.getElementById("groupCallPopupFrom").textContent =
    host + " started a group call. Join?";
  document.getElementById("groupCallPopup").style.display = "block";
  if (audioUnlocked) { ring.currentTime = 0; ring.play().catch(()=>{}); }
}

function declineGroupCall() {
  pendingGroupInvite = null;
  document.getElementById("groupCallPopup").style.display = "none";
  ring.pause();
}

async function acceptGroupCall() {
  if (!pendingGroupInvite) {
    declineGroupCall();
    return;
  }

  const { roomId, host } = pendingGroupInvite;
  pendingGroupInvite = null;
  document.getElementById("groupCallPopup").style.display = "none";
  ring.pause();

  if (inGroupCall || currentDirectPeer) return;

  try {
    await getMediaStream();
  } catch {
    return;
  }

  groupRoomId = roomId;
  groupHost = host;
  isGroupHost = false;
  inGroupCall = true;

  openOverlay("In group call", "Room " + groupRoomId);
  document.getElementById("remoteVideos").style.display = "flex";
  document.getElementById("remoteVideo").style.display = "none";

  await sendGroupSignal({
    roomId: groupRoomId,
    from: user,
    to: host,
    payload: { type:"join" }
  });
}

async function handleGroupSignals(msgs) {
  const signals = msgs.filter(m => m.text && m.text.startsWith("__GROUP_SIGNAL__"));

  for (const m of signals) {
    const key = m.time + "|" + m.username + "|" + m.text.length;
    if (processedGroupSignals.has(key)) continue;
    processedGroupSignals.add(key);

    let data;
    try { data = JSON.parse(m.text.replace("__GROUP_SIGNAL__", "")); } catch { continue; }

    const { roomId, from, to, payload } = data || {};
    if (!roomId || !payload || !from) continue;
    if (from === user) continue;

    // host logic
    if (isGroupHost && roomId === groupRoomId) {
      if (payload.type === "join" && to === user) {
        const username = from;
        if (!groupPeers[username]) {
          const pc = createGroupPCFor(username);
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await sendGroupSignal({
            roomId: groupRoomId,
            from: user,
            to: username,
            payload: { type:"offer", sdp:offer }
          });
        }
      } else if (payload.type === "answer" && to === user) {
        const username = from;
        const pc = groupPeers[username];
        if (pc && payload.sdp) {
          await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        }
      } else if (payload.type === "candidate" && to === user) {
        const username = from;
        const pc = groupPeers[username];
        if (pc && payload.candidate) {
          try { await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch {}
        }
      } else if (payload.type === "end" && to === user) {
        removeGroupPeer(from);
      }
    }

    // participant logic
    if (!isGroupHost && inGroupCall && roomId === groupRoomId) {
      if (payload.type === "offer" && to === user && from === groupHost) {
        let pc = groupPeers[from];
        if (!pc) pc = createGroupPCFor(from);
        if (payload.sdp) {
          await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await sendGroupSignal({
            roomId: groupRoomId,
            from: user,
            to: from,
            payload: { type:"answer", sdp:answer }
          });
        }
      } else if (payload.type === "candidate" && to === user && from === groupHost) {
        const pc = groupPeers[from];
        if (pc && payload.candidate) {
          try { await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch {}
        }
      } else if (payload.type === "end" && to === user && from === groupHost) {
        endCall(false);
      }
    }
  }
}

// ========== END CALL (BOTH MODES) ==========

async function endCall(sendSignalToo = true) {
  // direct
  if (currentDirectPeer && sendSignalToo) {
    await sendDirectSignal(currentDirectPeer, { type:"end" });
  }
  if (directPC) {
    try { directPC.close(); } catch {}
    directPC = null;
  }
  currentDirectPeer = null;
  isDirectCaller = false;
  pendingDirectOffer = null;

  // group
  if (inGroupCall && groupRoomId && sendSignalToo) {
    if (isGroupHost) {
      const peers = Object.keys(groupPeers);
      for (const p of peers) {
        await sendGroupSignal({
          roomId: groupRoomId,
          from: user,
          to: p,
          payload: { type:"end" }
        });
      }
    } else if (groupHost) {
      await sendGroupSignal({
        roomId: groupRoomId,
        from: user,
        to: groupHost,
        payload: { type:"end" }
      });
    }
  }

  for (const u in groupPeers) removeGroupPeer(u);
  groupPeers = {};
  groupRoomId = null;
  isGroupHost = false;
  inGroupCall = false;
  groupHost = null;
  pendingGroupInvite = null;

  // media
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  closeOverlay();
}

// controls
function toggleMute() {
  if (!localStream) return;
  const audioTracks = localStream.getAudioTracks();
  if (!audioTracks.length) return;
  const track = audioTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("muteBtn").textContent = track.enabled ? "Mute" : "Unmute";
}

function toggleCamera() {
  if (!localStream) return;
  const videoTracks = localStream.getVideoTracks();
  if (!videoTracks.length) return;
  const track = videoTracks[0];
  track.enabled = !track.enabled;
  document.getElementById("camBtn").textContent = track.enabled ? "Camera Off" : "Camera On";
}

// ========== DM LOAD ==========

async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  const dms = await res.json();

  handleDirectSignals(dms);

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a,b)=>new Date(a.time)-new Date(b.time));

  const latest = incoming[incoming.length-1];
  const newestTime = latest ? new Date(latest.time).getTime() : 0;
  if (newestTime > lastSeenDM) {
    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  if (!dmTarget) return;

  const filtered = dms.filter(m =>
    !m.text.startsWith("__CALL_SIGNAL__") &&
    ((m.from === user && m.to === dmTarget) ||
     (m.from === dmTarget && m.to === user))
  );

  document.getElementById("dmMessages").innerHTML =
    filtered.map(m =>
      `<p class="${m.from===user?'msg me':'msg'}"><b>${escapeHTML(m.from)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// PUBLIC
async function loadMessages() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  handleGroupAnnouncements(msgs);
  handleGroupSignals(msgs);

  if (mode !== "public") return;

  const visible = msgs.filter(m =>
    !m.text.startsWith("__GROUP_CALL__") &&
    !m.text.startsWith("__GROUP_SIGNAL__")
  );

  document.getElementById("messages").innerHTML =
    visible.map(m =>
      `<p class="${m.username===user?'msg me':'msg'}"><b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}</p>`
    ).join("");
}

// LOOP
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>
