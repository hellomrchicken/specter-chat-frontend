  </div>

  <div id="dmPopup">New DM!</div>

<script>
const API = "https://specter-chat-api.spectercat78.workers.dev";
const user = localStorage.getItem("user");

let mode = "public";
let dmTarget = null;

// 🔥 Timestamp-based DM tracking
let lastSeenDM = Number(localStorage.getItem("lastSeenDM")) || 0;
let initialized = false;

if (!user) window.location = "index.html";

document.title = "Specter Chat - " + user;

// ---------------- SECURITY ----------------
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

// ---------------- NOTIFICATIONS ----------------
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

const dmSound = new Audio("dm.mp3");

// unlock audio
document.addEventListener("click", () => {
  dmSound.muted = true;
  dmSound.play().then(() => {
    dmSound.pause();
    dmSound.currentTime = 0;
    dmSound.muted = false;
  });
}, { once: true });

function showDMPopup() {
  const popup = document.getElementById("dmPopup");
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 3000);
}

// ---------------- USERS ----------------
async function loadUsers() {
  const res = await fetch(API + "/messages");
  const msgs = await res.json();
  const users = [...new Set(msgs.map(m => m.username))];

  document.getElementById("userList").innerHTML =
    users.map(u => `<p onclick="openDM('${u}')">${escapeHTML(u)}</p>`).join("");
}

// ---------------- MODE ----------------
function switchMode(m) {
  mode = m;
  document.getElementById("messages").style.display = m === "public" ? "block" : "none";
  document.getElementById("dmMessages").style.display = m === "dm" ? "block" : "none";
  if (m === "public") dmTarget = null;
}

// ---------------- DM ----------------
function openDM(target) {
  mode = "dm";
  dmTarget = target;
  switchMode("dm");

  // mark messages as seen when opening DM
  lastSeenDM = Date.now();
  localStorage.setItem("lastSeenDM", lastSeenDM);

  loadDMs();
}

// ---------------- SEND ----------------
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  if (mode === "public") {
    await fetch(API + "/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, text })
    });
  } else {
    await fetch(API + "/dm/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ from: user, to: dmTarget, text })
    });
  }

  input.value = "";
  loadMessages();
  loadDMs();
}

// ENTER TO SEND
document.getElementById("msg").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

// ---------------- LOAD DMs ----------------
async function loadDMs() {
  const res = await fetch(API + "/dm/get", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: user })
  });

  const dms = await res.json();

  const incoming = dms
    .filter(m => m.to === user && m.from !== user)
    .sort((a, b) => new Date(a.time) - new Date(b.time));

  if (incoming.length > 0) {
    const newest = incoming[incoming.length - 1];
    const newestTime = new Date(newest.time).getTime();

    if (initialized && newestTime > lastSeenDM && mode !== "dm") {
      dmSound.play();
      showDMPopup();

      if (Notification.permission === "granted") {
        new Notification("New DM!", { body: newest.text });
      }
    }

    lastSeenDM = newestTime;
    localStorage.setItem("lastSeenDM", lastSeenDM);
  }

  initialized = true;

  if (!dmTarget) return;

  const filtered = dms.filter(
    m => (m.from === user && m.to === dmTarget) ||
         (m.from === dmTarget && m.to === user)
  );

  const box = document.getElementById("dmMessages");
  box.innerHTML = filtered.map(m => `
    <p class="msg ${m.from === user ? 'me' : ''}">
      <b>${escapeHTML(m.from)} → ${escapeHTML(m.to)}:</b> ${escapeHTML(m.text)}
    </p>
  `).join("");

  box.scrollTop = box.scrollHeight;
}

// ---------------- PUBLIC ----------------
async function loadMessages() {
  if (mode !== "public") return;

  const res = await fetch(API + "/messages");
  const msgs = await res.json();

  const box = document.getElementById("messages");
  box.innerHTML = msgs.map(m => `
    <p class="msg ${m.username === user ? 'me' : ''}">
      <b>${escapeHTML(m.username)}:</b> ${escapeHTML(m.text)}
    </p>
  `).join("");

  box.scrollTop = box.scrollHeight;
}

// ---------------- LOGOUT ----------------
function logout() {
  localStorage.removeItem("user");
  localStorage.removeItem("lastSeenDM");
  window.location = "index.html";
}

// ---------------- LOOP ----------------
setInterval(() => {
  loadMessages();
  loadDMs();
  loadUsers();
}, 2000);

loadMessages();
loadUsers();
</script>

</body>
